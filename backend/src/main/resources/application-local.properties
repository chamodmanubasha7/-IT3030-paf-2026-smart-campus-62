# ==================== H2 In-Memory DB (local dev) ====================
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Dummy JWT / Google values so the app starts without real .env
app.jwt.secret=bG9jYWxkZXZzZWNyZXRrZXlmb3JkZXZlbG9wbWVudG9ubHk=
app.jwt.expiration-ms=86400000
google.client-id=dummy-client-id.apps.googleusercontent.com
