spring.application.name=smart-campus-backend

# ==================== MySQL Database (Aiven via .env) ====================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME}?sslMode=${DB_SSL_MODE:REQUIRED}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ==================== Google OAuth2 ====================
google.client-id=${GOOGLE_CLIENT_ID}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:test}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:test}

# ==================== CORS ====================
app.cors.allowed-origin=http://localhost:5173,http://127.0.0.1:5173

# ==================== Invites ====================
app.invites.base-url=http://localhost:5173
app.invites.expiration-hours=72

# ==================== Module C – Ticketing uploads ====================
app.ticketing.upload-dir=uploads/tickets
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
# ==================== Gmail SMTP (App Password) ====================
# Set MAIL_USERNAME / MAIL_PASSWORD in .env (2FA + App Password on Google Account).
# If username is empty, invite emails are skipped (invite + inviteUrl in API still work).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Helps some networks / SSL handshakes with Gmail
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from-name=${MAIL_FROM_NAME:Smart Campus}
